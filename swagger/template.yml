  # ── Student Exams — runtime (take exam, attempts, submit) ───────────────
  /tests/available:
    get:
      tags: [Student Exams]
      summary: List published tests available to take
      description: |
        Students see published tests only if they are:
        - enrolled in the subject
        - assigned in the exam whitelist
        Workspace owner/admin see all published tests in the workspace.
      security: [{ Bearer: [], WorkspaceId: [] }]
      responses:
        200:
          description: Available tests
          schema:
            type: object
            properties:
              count: { type: integer }
              tests:
                type: array
                items:
                  $ref: "#/definitions/TestSummary"
  /tests/{test_id}/attempts:
    get:
      tags: [Tests]
      summary: List attempts for a test (teacher/admin)
      description: Requires test creator, workspace owner/admin, or subject-assigned teacher.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Attempt list
          schema:
            type: object
            properties:
              count: { type: integer }
              attempts:
                type: array
                items:
                  $ref: "#/definitions/TestAttempt"
        403:
          description: Forbidden
    post:
      tags: [Student Exams]
      summary: Start or resume exam attempt
      description: |
        Student must be enrolled in the test subject and assigned in exam whitelist.
        Returns 200 when resuming an in-progress attempt, 201 when starting new.
        Entry window is checked only when creating the first attempt.
        Resume ignores entry window and is allowed until global end time.
        Remaining time is based on (starts_at + duration_minutes) - now.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        201:
          description: Attempt started
          schema:
            $ref: "#/definitions/StartAttemptResponse"
        200:
          description: Attempt resumed
          schema:
            $ref: "#/definitions/StartAttemptResponse"
        409:
          description: Already completed
        403:
          description: Entry window closed or student not assigned
        422:
          description: Test not available
  /tests/{test_id}/attempts/current:
    get:
      tags: [Student Exams]
      summary: Get current in-progress attempt (resume)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: In-progress attempt with questions (student view — no correct answers)
          schema:
            type: object
            properties:
              attempt:
                $ref: "#/definitions/TestAttemptRuntime"
        404:
          description: No in-progress attempt
  /tests/{test_id}/attempts/{attempt_id}:
    get:
      tags: [Student Exams, Tests]
      summary: Get attempt details
      description: Student sees own attempt without correct answers. Teachers see full grading data.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Attempt detail
          schema:
            type: object
            properties:
              attempt:
                $ref: "#/definitions/TestAttemptRuntime"
  /tests/{test_id}/attempts/{attempt_id}/answers:
    put:
      tags: [Student Exams]
      summary: Bulk autosave answers
      description: Upsert multiple answers while attempt is IN_PROGRESS. Idempotent per test_question_id.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [answers]
            properties:
              answers:
                type: array
                items:
                  $ref: "#/definitions/SaveAnswerItem"
            example:
              answers:
                - test_question_id: 1
                  selected_choice_indices: [0]
                - test_question_id: 2
                  answer_text: "Photosynthesis converts light to chemical energy."
      responses:
        200:
          description: Answers saved
          schema:
            type: object
            properties:
              message: { type: string }
              count: { type: integer }
              answers:
                type: array
                items:
                  $ref: "#/definitions/AttemptAnswer"
        409:
          description: Attempt not in progress
  /tests/{test_id}/attempts/{attempt_id}/answers/{test_question_id}:
    patch:
      tags: [Student Exams]
      summary: Update a single answer (autosave)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
        - name: test_question_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            $ref: "#/definitions/SaveAnswerItem"
      responses:
        200:
          description: Answer updated
  /tests/{test_id}/attempts/{attempt_id}/submit:
    post:
      tags: [Student Exams]
      summary: Submit attempt (student)
      description: Finalizes attempt, runs auto-grading for objective questions, sets status GRADED when fully auto-graded.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Submitted
          schema:
            $ref: "#/definitions/SubmitAttemptResponse"
  /tests/{test_id}/attempts/{attempt_id}/force-submit:
    post:
      tags: [Tests]
      summary: Force submit attempt (teacher/admin)
      description: Teacher, workspace owner/admin, or test creator may finalize a student attempt.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Force submitted (submission_source=FORCE)
  /tests/{test_id}/attempts/{attempt_id}/timeout:
    post:
      tags: [Student Exams]
      summary: Finalize attempt on timeout
      description: |
        Called when client timer expires. Also applied automatically when expires_at is reached
        on any attempt read/write. submission_source=TIMEOUT.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Timed out and finalized
  # ── Proctoring — teacher/proctor monitoring ─────────────────────────────
  /tests/{test_id}/proctoring/sessions:
    get:
      tags: [Proctoring]
      summary: List active proctoring sessions for a test
      description: Teacher, admin, or test creator only.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Active proctoring sessions
  /tests/{test_id}/attempts/{attempt_id}/proctoring/session:
    post:
      tags: [Student Exams]
      summary: Start proctoring session
      description: |
        Student only. Also auto-started when attempt begins if test.settings_config.proctoring.enabled is true.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              device_metadata: { type: object }
              browser_metadata: { type: object }
      responses:
        201:
          description: Session started
    get:
      tags: [Student Exams, Proctoring]
      summary: Get proctoring session status
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Session status
  /tests/{test_id}/attempts/{attempt_id}/proctoring/events:
    post:
      tags: [Student Exams]
      summary: Ingest proctoring event (REST)
      description: Student generates events. WebSocket channel is preferred for real-time.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [event_type]
            properties:
              event_type: { type: string, example: TAB_SWITCH }
              payload: { type: object }
      responses:
        201:
          description: Event recorded (may include violation)
  /tests/{test_id}/attempts/{attempt_id}/proctoring/violations:
    get:
      tags: [Student Exams, Proctoring]
      summary: List violations for attempt
      description: Students see their own violations (limited fields). Teachers/proctors see full details.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Violations list
  /tests/{test_id}/attempts/{attempt_id}/proctoring/violations/{violation_id}/evidence:
    get:
      tags: [Student Exams, Proctoring]
      summary: Get evidence package for violation
      description: MEDIUM and HIGH violations include forensic evidence package.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
        - name: violation_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Evidence package
  /tests/{test_id}/attempts/{attempt_id}/proctoring/violations/{violation_id}/review:
    post:
      tags: [Proctoring]
      summary: Review violation (proctor/admin)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: violation_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [status]
            properties:
              status: { type: string, enum: [REVIEWED, DISMISSED, CONFIRMED] }
              review_notes: { type: string }
      responses:
        200:
          description: Violation reviewed
  /tests/{test_id}/attempts/{attempt_id}/proctoring/audit-logs:
    get:
      tags: [Proctoring]
      summary: Proctoring audit log trail
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: attempt_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Audit logs
  /join-codes/register-student:
    post:
      tags: [Join codes]
      summary: Register new student with join code
      description: Creates user account and STUDENT membership. No Bearer token required.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password, full_name, join_code]
            properties:
              email: { type: string }
              password: { type: string }
              full_name: { type: string }
              join_code: { type: string, example: "O388NXTZ" }
      responses:
        201:
          description: Student registered and joined workspace
  /join-codes/join:
    post:
      tags: [Join codes]
      summary: Existing user joins as STUDENT
      security: [{ Bearer: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              join_code: { type: string }
      responses:
        201:
          description: Joined
  /invites:
    post:
      tags: [Invites]
      summary: Create invitation
      description: |
        Email links and dev response URLs use FRONTEND_BASE_URL (React app), not the API server.
        Frontend pages extract the token and call POST /invites/{token}/register or /accept.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              email: { type: string }
              assigned_role: { type: string, enum: [ADMIN, TEACHER, STUDENT] }
      responses:
        201:
          description: Invite created
          schema:
            type: object
            properties:
              invite_id: { type: integer }
              invited_email: { type: string }
              assigned_role: { type: string }
              expires_at: { type: string }
              email_sent: { type: boolean }
              email_hint: { type: string, description: Present in DEBUG when email_sent is false }
              dev_token: { type: string, description: Development only }
              preview_url: { type: string, example: "http://localhost:5173/invites/{token}" }
              register_url: { type: string, example: "http://localhost:5173/invites/{token}/register" }
              accept_url: { type: string, example: "http://localhost:5173/invites/{token}/accept" }
  /invites/{token}:
    get:
      tags: [Invites]
      summary: Preview invite (read-only, no auth)
      description: Does not mutate database state. Works for guests and logged-in users.
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Invite preview (invited_email, role, workspace, status)
  /invites/{token}/register:
    post:
      tags: [Invites]
      summary: Register new user through invitation
      description: Email comes from invitation only. Not under /auth. For users without an account.
      parameters:
        - name: token
          in: path
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [full_name, password]
            properties:
              full_name: { type: string, example: "Ali Ahmad" }
              password: { type: string, example: "StrongPassword123" }
      responses:
        201:
          description: User and membership created, invitation accepted
        409:
          description: Account already exists — use POST /invites/{token}/accept after login
  /invites/{token}/accept:
    post:
      tags: [Invites]
      summary: Accept invite (existing user only)
      description: Requires access_token. Email must match invitation invited_email.
      security: [{ Bearer: [] }]
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Membership created
  /invites/{token}/reject:
    post:
      tags: [Invites]
      summary: Reject invite (no auth)
      description: Marks invitation as REJECTED. Does not create user or membership.
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Rejected
  /admin/institutions/pending:
    get:
      tags: [Super Admin]
      summary: List pending institution registrations
      description: |
        Returns owner users with PENDING_APPROVAL and registration_intents (no workspace yet).
        Requires super admin access_token from POST /auth/superadmin/login.
      security: [{ Bearer: [] }]
      responses:
        200:
          description: Pending institution requests with full registration form data
  /admin/institutions/{user_id}:
    get:
      tags: [Super Admin]
      summary: Get institution registration by owner user_id
      security: [{ Bearer: [] }]
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: Institution owner user id (not workspace id)
      responses:
        200:
          description: Registration details (pending, approved, or rejected)
  /admin/institutions/{user_id}/approve:
    post:
      tags: [Super Admin]
      summary: Approve institution registration
      description: |
        Creates INSTITUTION workspace, membership, and profile from stored registration_intent.
        Sets owner user status to ACTIVE.
      security: [{ Bearer: [] }]
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: Institution owner user id
      responses:
        200:
          description: Approved — workspace created
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
              workspace:
                type: object
                properties:
                  id: { type: integer }
                  kind: { type: string, example: INSTITUTION }
                  owner_user_id: { type: integer }
  /admin/institutions/{user_id}/reject:
    post:
      tags: [Super Admin]
      summary: Reject institution registration
      description: |
        Marks registration REJECTED, stores rejection reason, sets user REGISTRATION_REJECTED.
        No workspace is created.
      security: [{ Bearer: [] }]
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: Institution owner user id
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [reason]
            properties:
              reason: { type: string, example: "Incomplete documentation" }
      responses:
        200:
          description: Rejected
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }

definitions:
  TopicSummary:
    type: object
    properties:
      id: { type: integer, example: 10 }
      name: { type: string, example: "Algebra" }
  Topic:
    type: object
    properties:
      id: { type: integer }
      name: { type: string, example: "Algebra" }
      description: { type: string, example: "Basic algebra concepts" }
      subject_id: { type: integer }
      workspace_id: { type: integer }
      created_at: { type: string, format: date-time }
      updated_at: { type: string, format: date-time }
  SubjectWithTopics:
    type: object
    properties:
      id: { type: integer, example: 1 }
      name: { type: string, example: "Mathematics" }
      title: { type: string, example: "Mathematics" }
      description: { type: string }
      workspace_id: { type: integer }
      is_archived: { type: boolean }
      created_by_membership_id: { type: integer }
      created_at: { type: string, format: date-time }
      updated_at: { type: string, format: date-time }
      topics:
        type: array
        items:
          $ref: "#/definitions/TopicSummary"
  TestSummary:
    type: object
    properties:
      test_id: { type: integer }
      name: { type: string }
      slug: { type: string }
      subject_id: { type: integer }
      status: { type: string, example: PUBLISHED }
      duration_minutes: { type: integer }
      total_score: { type: number }
      passing_score: { type: number }
  TestAttempt:
    type: object
    properties:
      id: { type: integer }
      test_id: { type: integer }
      student_membership_id: { type: integer }
      user_id: { type: integer }
      status: { type: string, enum: [IN_PROGRESS, SUBMITTED, GRADED] }
      started_at: { type: string, format: date-time }
      submitted_at: { type: string, format: date-time }
      expires_at: { type: string, format: date-time }
      last_activity_at: { type: string, format: date-time }
      submission_source: { type: string, enum: [STUDENT, TIMEOUT, FORCE] }
      raw_score: { type: number }
      final_score: { type: number }
  TestAttemptRuntime:
    allOf:
      - $ref: "#/definitions/TestAttempt"
      - type: object
        properties:
          questions:
            type: array
            items:
              $ref: "#/definitions/RuntimeQuestion"
          answers:
            type: array
            items:
              $ref: "#/definitions/AttemptAnswer"
  StartAttemptResponse:
    type: object
    properties:
      message: { type: string }
      resumed: { type: boolean }
      attempt:
        $ref: "#/definitions/TestAttemptRuntime"
  SubmitAttemptResponse:
    type: object
    properties:
      message: { type: string }
      attempt:
        $ref: "#/definitions/TestAttemptRuntime"
  SaveAnswerItem:
    type: object
    required: [test_question_id]
    properties:
      test_question_id: { type: integer }
      answer_text: { type: string }
      selected_choice_indices:
        type: array
        items: { type: integer }
        description: Zero-based indices into snapshot choices
  AttemptAnswer:
    type: object
    properties:
      id: { type: integer }
      attempt_id: { type: integer }
      test_question_id: { type: integer }
      answer_text: { type: string }
      selected_choice_indices:
        type: array
        items: { type: integer }
      is_correct: { type: boolean }
      earned_score: { type: number }
      updated_at: { type: string, format: date-time }
  RuntimeQuestion:
    type: object
    properties:
      test_question_id: { type: integer }
      snapshot_question_text: { type: string }
      snapshot_type_code: { type: string, example: MCQ }
      points: { type: number }
      choices:
        type: array
        items:
          type: object
          properties:
            index: { type: integer }
            body: { type: string }
            order_index: { type: integer }
