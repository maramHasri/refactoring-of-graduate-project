              description: { type: string }
              subject_id: { type: integer, example: 1 }
              duration_minutes:
                type: integer
                default: 30
                example: 30
                description: Exam duration in minutes (default 30)
              total_score:
                type: number
                default: 100
                example: 100
                description: Maximum score (default 100)
              passing_score:
                type: number
                default: 50
                example: 50
                description: Passing score (default 50)
              auto_distribute_scores: { type: boolean, example: false }
      responses:
        201:
          description: Test created
