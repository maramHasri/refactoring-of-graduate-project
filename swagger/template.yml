        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [student_membership_ids]
            properties:
              student_membership_ids:
                type: array
                items: { type: integer }
                example: [15, 22, 35, 40]
      responses:
        201:
          description: Students assigned successfully
  /tests/{test_id}/assigned-students:
    get:
      tags: [Tests]
      summary: List exam assigned students
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Assigned students list
  /tests/{test_id}/assigned-students/{membership_id}:
    delete:
      tags: [Tests]
      summary: Remove assigned student from exam
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: membership_id
