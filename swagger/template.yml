              question_ids: { type: array, items: { type: integer } }
      responses:
        201:
          description: Question bank selection added
  /tests/{test_id}/questions/random-from-banks:
    post:
      tags: [Tests]
      summary: Generate exam questions from blueprint (random-from-banks)
      description: |
        Exam Blueprint Generator. Each bank defines question_count, topic percentages (must sum to 100),
        and per-topic difficulty_distribution (easy + medium + hard = 100).
        Questions are randomly selected per bank/topic/difficulty and snapshotted into the test.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [banks]
            properties:
              banks:
                type: array
                items:
                  type: object
                  required: [bank_id, question_count, topics]
                  properties:
                    bank_id: { type: integer, example: 3 }
                    question_count: { type: integer, example: 20 }
                    topics:
                      type: array
                      items:
                        type: object
                        required: [topic_id, percentage, difficulty_distribution]
                        properties:
                          topic_id: { type: integer, example: 11 }
                          percentage: { type: integer, example: 30 }
                          difficulty_distribution:
                            type: object
                            required: [easy, medium, hard]
                            properties:
                              easy: { type: integer, example: 20 }
                              medium: { type: integer, example: 50 }
                              hard: { type: integer, example: 30 }
      responses:
        201:
          description: Blueprint generated successfully
          schema:
            type: object
            properties:
              message: { type: string, example: "Blueprint generated successfully" }
              count: { type: integer }
              summary:
                type: array
                items:
                  type: object
                  properties:
                    bank_id: { type: integer }
                    requested: { type: integer }
                    inserted: { type: integer }
              questions: { type: array, items: { type: object } }
        400:
          description: Validation error (percentages, insufficient pool, topic not in bank)
  /tests/{test_id}/questions/ai-generate:
    post:
      tags: [Tests]
      summary: Generate and add AI questions to exam
      description: |
        Subject name is taken from the exam's linked subject and included in the AI prompt.
        Provider is selected via AI_QUESTION_PROVIDER (.env):
        - `qwen` — Alibaba DashScope (DASHSCOPE_API_KEY) or HuggingFace Qwen (HF_TOKEN)
        - `gemini` — Google Gemini (GEMINI_API_KEY, default model gemini-2.5-flash)
        - `huggingface` — HF router (HF_TOKEN + HF_QWEN_MODEL)
        - `placeholder` — local draft questions without external API
        - `auto` — gemini → qwen → huggingface → placeholder (first available)
        In development, AI_FALLBACK_TO_PLACEHOLDER=true uses placeholders on quota/404 errors.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [count]
            properties:
              count: { type: integer, example: 10 }
              type_code: { type: string, enum: [MCQ, TRUE_FALSE, MULTI_SELECT, ESSAY], default: MCQ }
              difficulty: { type: string, enum: [EASY, MEDIUM, HARD] }
              topics: { type: array, items: { type: string } }
              learning_objectives: { type: array, items: { type: string } }
              additional_instructions: { type: string }
      responses:
        201:
          description: AI questions added
          schema:
            type: object
            properties:
              message: { type: string }
              count: { type: integer }
              subject_name: { type: string }
              ai_model: { type: string, example: Qwen/Qwen2.5-7B-Instruct }
              questions: { type: array, items: { type: object } }
  /tests/{test_id}/questions/{test_question_id}:
    patch:
      tags: [Tests]
      summary: Update exam question snapshot
      description: |
        Partial update of a test_questions snapshot row. Allowed only while test is DRAFT
        and no student attempts exist. Does not modify the source question bank.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: test_question_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              type_code: { type: string, enum: [MCQ, TRUE_FALSE, MULTI_SELECT, ESSAY] }
              body: { type: string }
              explanation: { type: string }
              points: { type: number }
              difficulty: { type: string, enum: [EASY, MEDIUM, HARD] }
              topic_id: { type: integer }
              choices:
                type: array
                items:
                  type: object
                  properties:
                    body: { type: string }
                    is_correct: { type: boolean }
                    order_index: { type: integer }
      responses:
        200:
          description: Question updated
        422:
          description: Test not DRAFT or validation error
    delete:
      tags: [Tests]
      summary: Remove question from exam
      description: |
        Hard-deletes the test_questions snapshot. Allowed only while test is DRAFT
        and no student attempts exist.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - name: test_question_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Question removed
        404:
          description: Question not found
        422:
          description: Test not DRAFT or attempts exist
  /tests/{test_id}/assign-students:
    post:
      tags: [Tests]
      summary: Assign students to exam whitelist
