        200:
          description: Test scheduled
  /tests/{test_id}/close:
    post:
      tags: [Tests]
      summary: Close test
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Test closed
  /tests/{test_id}/archive:
    post:
      tags: [Tests]
      summary: Archive test
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Test archived
  /join-codes/register-student:
    post:
      tags: [Join codes]
      summary: Register new student with join code
      description: Creates user account and STUDENT membership. No Bearer token required.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password, full_name, join_code]
            properties:
              email: { type: string }
              password: { type: string }
              full_name: { type: string }
              join_code: { type: string, example: "O388NXTZ" }
      responses:
        201:
          description: Student registered and joined workspace
  /join-codes/join:
    post:
      tags: [Join codes]
      summary: Existing user joins as STUDENT
      security: [{ Bearer: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              join_code: { type: string }
      responses:
        201:
          description: Joined
  /invites:
    post:
      tags: [Invites]
      summary: Create invitation
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              email: { type: string }
              assigned_role: { type: string, enum: [ADMIN, TEACHER, STUDENT] }
      responses:
        201:
          description: Invite created
  /invites/{token}:
    get:
      tags: [Invites]
      summary: Preview invite (read-only, no auth)
      description: Does not mutate database state. Works for guests and logged-in users.
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Invite preview (invited_email, role, workspace, status)
  /invites/{token}/register:
    post:
      tags: [Invites]
      summary: Register new user through invitation
      description: Email comes from invitation only. Not under /auth. For users without an account.
      parameters:
        - name: token
          in: path
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [full_name, password]
            properties:
              full_name: { type: string, example: "Ali Ahmad" }
              password: { type: string, example: "StrongPassword123" }
      responses:
        201:
          description: User and membership created, invitation accepted
        409:
          description: Account already exists — use POST /invites/{token}/accept after login
  /invites/{token}/accept:
    post:
      tags: [Invites]
      summary: Accept invite (existing user only)
      description: Requires access_token. Email must match invitation invited_email.
      security: [{ Bearer: [] }]
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Membership created
  /invites/{token}/reject:
    post:
      tags: [Invites]
      summary: Reject invite (no auth)
      description: Marks invitation as REJECTED. Does not create user or membership.
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Rejected
  /admin/institutions/pending:
    get:
      tags: [Super Admin]
      summary: List pending institution registrations
      description: |
        Returns owner users with PENDING_APPROVAL and registration_intents (no workspace yet).
        Requires super admin access_token from POST /auth/superadmin/login.
      security: [{ Bearer: [] }]
      responses:
        200:
          description: Pending institution requests with full registration form data
  /admin/institutions/{user_id}:
    get:
      tags: [Super Admin]
      summary: Get institution registration by owner user_id
      security: [{ Bearer: [] }]
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: Institution owner user id (not workspace id)
      responses:
        200:
          description: Registration details (pending, approved, or rejected)
  /admin/institutions/{user_id}/approve:
    post:
      tags: [Super Admin]
      summary: Approve institution registration
      description: |
        Creates INSTITUTION workspace, membership, and profile from stored registration_intent.
        Sets owner user status to ACTIVE.
      security: [{ Bearer: [] }]
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: Institution owner user id
      responses:
        200:
          description: Approved — workspace created
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
              workspace:
                type: object
                properties:
                  id: { type: integer }
                  kind: { type: string, example: INSTITUTION }
                  owner_user_id: { type: integer }
  /admin/institutions/{user_id}/reject:
    post:
      tags: [Super Admin]
      summary: Reject institution registration
      description: |
        Marks registration REJECTED, stores rejection reason, sets user REGISTRATION_REJECTED.
        No workspace is created.
      security: [{ Bearer: [] }]
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: Institution owner user id
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [reason]
            properties:
              reason: { type: string, example: "Incomplete documentation" }
      responses:
        200:
          description: Rejected
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
