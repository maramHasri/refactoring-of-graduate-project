swagger: "2.0"
info:
  title: edu_forms API
  description: Multi-tenant educational assessment platform
  version: "1.0.0"
host: "127.0.0.1:5000"
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: "JWT access token. Example: Bearer eyJhbG..."
  WorkspaceId:
    type: apiKey
    name: X-Workspace-Id
    in: header
    description: Active workspace context (not in JWT)
tags:
  - name: Meta
  - name: Auth
  - name: Super Admin
  - name: Workspaces
    description: Workspace management and student subject assignments
  - name: Subjects
  - name: Question banks
  - name: Tests
    description: Teacher/admin — create, configure, publish, and manage exams
  - name: Student Exams
    description: Student — available exams, start/resume attempts, autosave answers, submit, and exam-time proctoring
  - name: Proctoring
    description: Teacher/proctor — monitor sessions, review violations, and audit logs
  - name: Invites
  - name: Join codes
paths:
  /:
    get:
      tags: [Meta]
      summary: API entry — links to Swagger and health
      responses:
        200:
          description: Welcome JSON
  /health:
    get:
      tags: [Meta]
      summary: Health check
      responses:
        200:
          description: OK
  /health/db:
    get:
      tags: [Meta]
      summary: Database health
      responses:
        200:
          description: Connected
  /api/enums:
    get:
      tags: [Meta]
      summary: List enum values
      responses:
        200:
          description: Enum reference
  /auth/register:
    post:
      tags: [Auth]
      summary: Register workspace owner
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password, full_name, workspace_name, workspace_kind]
            properties:
              email: { type: string, example: owner@school.com }
              password: { type: string, example: "Password123!" }
              full_name: { type: string, example: "Jane Owner" }
              workspace_name: { type: string, example: "My Academy" }
              workspace_kind: { type: string, enum: [SOLO, INSTITUTION] }
              slug: { type: string }
              phone_number: { type: string }
              country: { type: string, description: Institution registration }
              city: { type: string }
              website_url: { type: string }
              description: { type: string }
      responses:
        201:
          description: OTP sent; complete registration via POST /auth/verify-otp
  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string, example: user@example.com }
              password: { type: string, example: "Password123!" }
      responses:
        200:
          description: Tokens + user + memberships
  /auth/superadmin/login:
    post:
      tags: [Super Admin]
      summary: Super admin login (POST only — not GET)
      description: Use Try it out in Swagger. Browser address bar sends GET and returns 405.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string, example: superadmin@eduforms.local }
              password: { type: string, example: "SuperAdmin@123" }
      responses:
        200:
          description: Tokens + is_superadmin true
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      security: [{ Bearer: [] }]
      responses:
        200:
          description: Logged out
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all sessions
      security: [{ Bearer: [] }]
      responses:
        200:
          description: All sessions revoked
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [refresh_token]
            properties:
              refresh_token: { type: string }
      responses:
        200:
          description: New tokens
  /auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify email OTP (registration or password reset)
      description: |
        6-digit OTP from email. Expires in 15 minutes (configurable). Max 5 wrong attempts.
        - Registration / account verification: completes signup or marks email verified.
        - Password reset (after POST /auth/forgot-password): validates OTP; then call
          POST /auth/reset-password with email and new_password only.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, otp]
            properties:
              email: { type: string, format: email, example: owner@school.com }
              otp: { type: string, example: "123456", pattern: "^[0-9]{6}$" }
      responses:
        200:
          description: Verified
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
              email_verified: { type: boolean }
              otp_verified: { type: boolean }
              purpose: { type: string, enum: [REGISTER_OWNER, VERIFY_ACCOUNT, RESET_PASSWORD] }
              message: { type: string }
              workspace_status: { type: string }
              requires_admin_approval: { type: boolean }
  /auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend email OTP
      description: |
        Invalidates previous OTP and sends a new code. Rate limited (resend interval + hourly cap).
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email]
            properties:
              email:
                type: string
                format: email
                example: user@example.com
      responses:
        200:
          description: OTP sent
          schema:
            type: object
            properties:
              success: { type: boolean }
              email_sent: { type: boolean }
              dev_otp:
                type: string
                description: Only in development if Gmail fails
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Start password reset (6-digit OTP)
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email }
      responses:
        200:
          description: OTP sent if account exists
          schema:
            type: object
            properties:
              message: { type: string }
              email_sent: { type: boolean }
              dev_otp:
                type: string
                description: Only in development when EXPOSE_OTP_IN_DEV_RESPONSE is enabled
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete password reset (after OTP verified)
      description: |
        Requires a prior successful POST /auth/verify-otp for the same email
        (password-reset OTP from POST /auth/forgot-password).
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [email, new_password]
            properties:
              email: { type: string, format: email }
              new_password: { type: string, minLength: 8 }
      responses:
        200:
          description: Password reset
  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      security: [{ Bearer: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              current_password: { type: string }
              new_password: { type: string }
      responses:
        200:
          description: Changed
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List accessible workspaces
      security: [{ Bearer: [] }]
      responses:
        200:
          description: Workspace list
    post:
      tags: [Workspaces]
      summary: Create workspace
      security: [{ Bearer: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              name: { type: string }
              kind: { type: string, enum: [SOLO, INSTITUTION] }
              slug: { type: string }
      responses:
        201:
          description: Created
  /workspaces/teachers:
    get:
      tags: [Workspaces]
      summary: List institution workspace teachers
      description: |
        Returns active members with role TEACHER in the workspace selected via X-Workspace-Id.
        Institution workspaces only. Caller must be workspace owner or ADMIN.
        Teachers and students receive 403.
      security: [{ Bearer: [], WorkspaceId: [] }]
      responses:
        200:
          description: Teacher list
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
              count: { type: integer }
              data:
                type: array
                items:
                  type: object
                  properties:
                    user_id: { type: integer }
                    full_name: { type: string, example: "Ahmed Ali" }
                    email: { type: string, example: "ahmed@example.com" }
                    membership_role: { type: string, example: "TEACHER" }
                    created_at: { type: string, format: date-time }
        403:
          description: Forbidden (not owner/admin, or not an institution workspace)
  /workspaces/{workspace_id}:
    get:
      tags: [Workspaces]
      summary: Get workspace
      security: [{ Bearer: [] }]
      parameters:
        - name: workspace_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Workspace detail
    patch:
      tags: [Workspaces]
      summary: Update workspace
      security: [{ Bearer: [] }]
      parameters:
        - name: workspace_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Updated
    delete:
      tags: [Workspaces]
      summary: Delete workspace (owner only)
      security: [{ Bearer: [] }]
      parameters:
        - name: workspace_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Deleted
  /student-memberships/subjects:
    post:
      tags: [Workspaces]
      operationId: assignSubjectsToStudent
      summary: Assign subjects to student
      description: Bulk-assign subjects to a student membership. Owner or ADMIN only.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [membership_id, subject_ids]
            properties:
              membership_id: { type: integer }
              subject_ids:
                type: array
                items: { type: integer }
      responses:
        201:
          description: Subjects assigned
        403:
          description: Forbidden
        404:
          description: Not found
        422:
          description: Validation error
  /student-memberships/{membership_id}/subjects:
    get:
      tags: [Workspaces]
      operationId: listStudentSubjects
      summary: List subjects assigned to student
      description: Owner, ADMIN, or the student themselves.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: membership_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Assigned subjects
        403:
          description: Forbidden
        404:
          description: Not found
    put:
      tags: [Workspaces]
      operationId: replaceStudentSubjects
      summary: Replace student subject assignments
      description: Sync subject_memberships to match subject_ids. Owner or ADMIN only.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: membership_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [subject_ids]
            properties:
              subject_ids:
                type: array
                items: { type: integer }
      responses:
        200:
          description: Assignments updated
        403:
          description: Forbidden
        404:
          description: Not found
  /student-memberships/{membership_id}/subjects/{subject_id}:
    delete:
      tags: [Workspaces]
      operationId: removeStudentSubject
      summary: Remove one subject from student
      description: Soft-remove one subject assignment. Owner or ADMIN only.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: membership_id
          in: path
          type: integer
          required: true
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Subject removed
        403:
          description: Forbidden
        404:
          description: Not found
  /subjects:
    get:
      tags: [Subjects]
      summary: List workspace subjects
      description: Admin/owner see all. Teachers/students see assigned subjects only. Requires X-Workspace-Id.
      security: [{ Bearer: [], WorkspaceId: [] }]
      responses:
        200:
          description: Subject list
          schema:
            type: object
            properties:
              count: { type: integer }
              subjects:
                type: array
                items:
                  $ref: "#/definitions/SubjectWithTopics"
    post:
      tags: [Subjects]
      summary: Create subject (owner or admin)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name]
            properties:
              name: { type: string, example: "Mathematics" }
              description: { type: string }
      responses:
        201:
          description: Subject created
  /subjects/{subject_id}:
    get:
      tags: [Subjects]
      summary: Get subject details
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Subject detail
          schema:
            $ref: "#/definitions/SubjectWithTopics"
    patch:
      tags: [Subjects]
      summary: Update subject (owner or admin)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name: { type: string }
              description: { type: string }
              is_archived: { type: boolean }
      responses:
        200:
          description: Updated
    delete:
      tags: [Subjects]
      summary: Archive subject (soft delete)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Archived
  /subjects/{subject_id}/teachers:
    get:
      tags: [Subjects]
      summary: List teachers assigned to subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Teacher assignments
          schema:
            type: object
            properties:
              count: { type: integer }
              teachers:
                type: array
                items:
                  type: object
                  properties:
                    assignment_id: { type: integer }
                    membership_id: { type: integer }
                    subject_id: { type: integer }
                    subject_role: { type: string, example: "TEACHER" }
                    membership_role: { type: string, example: "TEACHER" }
                    full_name: { type: string, example: "Ahmed Ali" }
                    assigned_at: { type: string, format: date-time }
    post:
      tags: [Subjects]
      summary: Assign teacher to subject
      description: Creates subject_memberships row with subject_role=TEACHER
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [membership_id]
            properties:
              membership_id: { type: integer, example: 6 }
      responses:
        201:
          description: Assigned
  /subjects/{subject_id}/teachers/{membership_id}:
    delete:
      tags: [Subjects]
      summary: Remove teacher from subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: membership_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Removed
  /subjects/{subject_id}/students:
    get:
      tags: [Subjects]
      summary: List students enrolled in subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Student enrollments
    post:
      tags: [Subjects]
      summary: Enroll student in subject
      description: Admin/owner or teacher assigned to this subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [membership_id]
            properties:
              membership_id: { type: integer }
      responses:
        201:
          description: Enrolled
  /subjects/{subject_id}/students/{membership_id}:
    delete:
      tags: [Subjects]
      summary: Remove student from subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: membership_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Removed
  /subjects/{subject_id}/topics:
    get:
      tags: [Subjects]
      summary: List topics for subject
      description: |
        Requires active subject assignment (TEACHER or STUDENT) or workspace admin/owner.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Topics in subject
          schema:
            type: object
            properties:
              count: { type: integer }
              topics:
                type: array
                items:
                  $ref: "#/definitions/Topic"
    post:
      tags: [Subjects]
      summary: Create topic under subject
      description: |
        Workspace owner or admin only. Topics are scoped to a subject (not per question bank).
        Topic names must be unique within the same subject.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name]
            properties:
              name: { type: string, example: "Algebra" }
              description: { type: string, example: "Basic algebra concepts" }
      responses:
        201:
          description: Topic created
          schema:
            type: object
            properties:
              message: { type: string }
              topic:
                $ref: "#/definitions/Topic"
  /subjects/{subject_id}/topics/{topic_id}:
    get:
      tags: [Subjects]
      summary: Get topic by id
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: topic_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Topic details
          schema:
            type: object
            properties:
              topic:
                $ref: "#/definitions/Topic"
    patch:
      tags: [Subjects]
      summary: Update topic
      description: Workspace owner or admin only. subject_id cannot be changed.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: topic_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name: { type: string }
              description: { type: string }
      responses:
        200:
          description: Topic updated
    delete:
      tags: [Subjects]
      summary: Delete topic
      description: |
        Workspace owner or admin only. Deletion is blocked when questions still reference the topic.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: topic_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Topic deleted
  /subjects/{subject_id}/question-banks:
    get:
      tags: [Subjects]
      summary: List question banks for subject
      description: Visibility rules applied (PRIVATE, WORKSPACE, COMMUNITY)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Question banks
  /question-banks:
    post:
      tags: [Question banks]
      summary: Create question bank
      description: Admin or teacher with subject_role=TEACHER on subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [title, subject_id]
            properties:
              title: { type: string, example: "Algebra Bank" }
              subject_id: { type: integer, example: 1 }
              description: { type: string }
              visibility: { type: string, enum: [PRIVATE, WORKSPACE, COMMUNITY], example: "WORKSPACE" }
      responses:
        201:
          description: Created
  /question-banks/my:
    get:
      tags: [Question banks]
      summary: My question banks (current membership)
      security: [{ Bearer: [], WorkspaceId: [] }]
      responses:
        200:
          description: Banks created by you
          schema:
            type: object
            properties:
              count: { type: integer }
              question_banks:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    title: { type: string }
                    description: { type: string }
                    workspace_id: { type: integer }
                    subject_id: { type: integer }
                    subject_name: { type: string, example: "Cyber Security" }
                    visibility: { type: string }
                    is_archived: { type: boolean }
                    created_by_membership_id: { type: integer }
                    created_at: { type: string, format: date-time }
                    updated_at: { type: string, format: date-time }
  /question-banks/workspace:
    get:
      tags: [Question banks]
      summary: Discover workspace question banks (other teachers)
      description: |
        Returns active WORKSPACE visibility banks created by other members in the
        current workspace. Excludes banks created by the current user.
        Teachers see banks only for subjects they teach; workspace owner/admin see
        banks across all workspace subjects.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: page
          in: query
          type: integer
          default: 1
        - name: per_page
          in: query
          type: integer
          default: 20
      responses:
        200:
          description: Paginated workspace banks
          schema:
            type: object
            properties:
              question_banks: { type: array, items: { type: object } }
              count: { type: integer }
              total: { type: integer }
              page: { type: integer }
              per_page: { type: integer }
              pages: { type: integer }
  /question-banks/community:
    get:
      tags: [Question banks]
      summary: Discover community question banks
      description: |
        Returns all active question banks with visibility COMMUNITY across the entire platform.
        No workspace or subject assignment is required to discover them.
        Use GET /question-banks/{bank_id} and GET /question-banks/{bank_id}/questions
        (with your X-Workspace-Id) to browse content from any workspace.
      security: [{ Bearer: [] }]
      parameters:
        - name: page
          in: query
          type: integer
          default: 1
        - name: per_page
          in: query
          type: integer
          default: 20
      responses:
        200:
          description: Paginated community banks
          schema:
            type: object
            properties:
              question_banks: { type: array, items: { type: object } }
              count: { type: integer }
              total: { type: integer }
              page: { type: integer }
              per_page: { type: integer }
              pages: { type: integer }
  /question-banks/{bank_id}/questions:
    post:
      tags: [Question banks]
      summary: Add questions to bank (add questions bulk)
      description: |
        Always send `{ "questions": [ ... ] }` — use one element for a single question
        or many for a full editing session. All questions are created in one transaction;
        if any item fails, nothing is saved.
        Supported type_code values: MCQ, TRUE_FALSE, MULTI_SELECT, ESSAY.
        Optional topic_id per question — must be a topic under the bank's subject
        (list topics via GET /subjects/{subject_id}/topics).
        Requires TEACHER assignment on the bank's subject (or workspace admin/owner).
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: bank_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [questions]
            properties:
              questions:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [type_code, body]
                  properties:
                    type_code:
                      type: string
                      enum: [MCQ, TRUE_FALSE, MULTI_SELECT, ESSAY]
                    body: { type: string }
                    explanation: { type: string }
                    points: { type: number }
                    difficulty: { type: string, enum: [EASY, MEDIUM, HARD] }
                    topic_id:
                      type: integer
                      description: Optional. Must belong to the bank's subject (same workspace).
                    choices:
                      type: array
                      items:
                        type: object
                        required: [body, is_correct]
                        properties:
                          body: { type: string }
                          is_correct: { type: boolean }
                          order_index: { type: integer }
            example:
              questions:
                - type_code: MCQ
                  body: "What is 2 + 2?"
                  topic_id: 11
                  points: 2
                  difficulty: EASY
                  choices:
                    - { body: "4", is_correct: true }
                    - { body: "5", is_correct: false }
                - type_code: ESSAY
                  body: "Explain photosynthesis."
                  topic_id: 12
                  points: 5
                  difficulty: MEDIUM
      responses:
        201:
          description: Questions created
          schema:
            type: object
            properties:
              message: { type: string }
              count: { type: integer }
              questions: { type: array, items: { type: object } }
    get:
      tags: [Question banks]
      summary: List questions in bank
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: bank_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Questions in bank
