  /tests/{test_id}/publish-now:
    post:
      tags: [Tests]
      summary: Publish test immediately
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Test published
  /tests/{test_id}/schedule-publication:
    post:
      tags: [Tests]
      summary: Schedule test publication
      description: |
        Sets status to SCHEDULED and stores publish_at in scheduled_publish_at.
        Send naive local datetime (no Z suffix), e.g. `2026-06-29T08:00:00`.
        Times use APP_TIMEZONE from server config (default Asia/Damascus).
        A background job checks every 5s (configurable) and auto-publishes due tests.
        You can also run `flask publish-due-tests` manually.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: test_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [publish_at]
            properties:
              publish_at:
                type: string
                example: "2026-06-29T08:00:00"
                description: Local wall-clock time (APP_TIMEZONE). No Z or offset suffix.
      responses:
        200:
          description: Test scheduled
  /tests/{test_id}/close:
    post:
      tags: [Tests]
      summary: Close test
