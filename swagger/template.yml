swagger: "2.0"
info:
  title: edu_forms API
  description: Multi-tenant educational assessment platform
  version: "1.0.0"
host: "127.0.0.1:5000"
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: "JWT access token. Example: Bearer eyJhbG..."
  WorkspaceId:
    type: apiKey
    name: X-Workspace-Id
    in: header
    description: Active workspace context (not in JWT)
paths:
  /:
    get:
      tags: [Meta]
      summary: API entry — links to Swagger and health
      responses:
        200:
          description: Welcome JSON
  /health:
    get:
      tags: [Meta]
      summary: Health check
      responses:
        200:
          description: OK
  /health/db:
    get:
      tags: [Meta]
      summary: Database health
      responses:
        200:
          description: Connected
  /api/enums:
    get:
      tags: [Meta]
      summary: List enum values
      responses:
        200:
          description: Enum reference
  /auth/register:
    post:
      tags: [Auth]
      summary: Register workspace owner
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password, full_name, workspace_name, workspace_kind]
            properties:
              email: { type: string, example: owner@school.com }
              password: { type: string, example: "Password123!" }
              full_name: { type: string, example: "Jane Owner" }
              workspace_name: { type: string, example: "My Academy" }
              workspace_kind: { type: string, enum: [SOLO, INSTITUTION] }
              slug: { type: string }
              phone_number: { type: string }
      responses:
        201:
          description: Registered
  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string, example: user@example.com }
              password: { type: string, example: "Password123!" }
      responses:
        200:
          description: Tokens + user + memberships
  /auth/superadmin/login:
    post:
      tags: [Auth]
      summary: Super admin login (POST only — not GET)
      description: Use Try it out in Swagger. Browser address bar sends GET and returns 405.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string, example: superadmin@eduforms.local }
              password: { type: string, example: "SuperAdmin@123" }
      responses:
        200:
          description: Tokens + is_superadmin true
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      security: [{ Bearer: [] }]
      responses:
        200:
          description: Logged out
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all sessions
      security: [{ Bearer: [] }]
      responses:
        200:
          description: All sessions revoked
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [refresh_token]
            properties:
              refresh_token: { type: string }
      responses:
        200:
          description: New tokens
  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email with token from activation link
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [token]
            properties:
              token: { type: string, description: Token from email link }
      responses:
        200:
          description: Email verified
  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend activation / verification email (Gmail)
      description: |
        Creates a new verification token and sends activation link via Gmail.
        Does not require login. Use the same email used at registration.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email]
            properties:
              email:
                type: string
                format: email
                example: user@example.com
      responses:
        200:
          description: Activation email sent (email_sent true) or generic message if unknown email
          schema:
            type: object
            properties:
              message: { type: string }
              email_sent: { type: boolean }
              dev_verification_token:
                type: string
                description: Only in development if Gmail fails
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Start password reset
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              email: { type: string }
      responses:
        200:
          description: Email sent if account exists
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete password reset
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              token: { type: string }
              new_password: { type: string }
      responses:
        200:
          description: Password reset
  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      security: [{ Bearer: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              current_password: { type: string }
              new_password: { type: string }
      responses:
        200:
          description: Changed
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List accessible workspaces
      security: [{ Bearer: [] }]
      responses:
        200:
          description: Workspace list
    post:
      tags: [Workspaces]
      summary: Create workspace
      security: [{ Bearer: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              name: { type: string }
              kind: { type: string, enum: [SOLO, INSTITUTION] }
              slug: { type: string }
      responses:
        201:
          description: Created
  /workspaces/{workspace_id}:
    get:
      tags: [Workspaces]
      summary: Get workspace
      security: [{ Bearer: [] }]
      parameters:
        - name: workspace_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Workspace detail
    patch:
      tags: [Workspaces]
      summary: Update workspace
      security: [{ Bearer: [] }]
      parameters:
        - name: workspace_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Updated
    delete:
      tags: [Workspaces]
      summary: Delete workspace (owner only)
      security: [{ Bearer: [] }]
      parameters:
        - name: workspace_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Deleted
  /subjects:
    get:
      tags: [Subjects]
      summary: List workspace subjects
      description: Admin/owner see all. Teachers/students see assigned subjects only. Requires X-Workspace-Id.
      security: [{ Bearer: [], WorkspaceId: [] }]
      responses:
        200:
          description: Subject list
    post:
      tags: [Subjects]
      summary: Create subject (owner or admin)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name]
            properties:
              name: { type: string, example: "Mathematics" }
              code: { type: string, example: "MATH101" }
              description: { type: string }
      responses:
        201:
          description: Subject created
  /subjects/{subject_id}:
    get:
      tags: [Subjects]
      summary: Get subject details
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Subject detail
    patch:
      tags: [Subjects]
      summary: Update subject (owner or admin)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name: { type: string }
              code: { type: string }
              description: { type: string }
              is_archived: { type: boolean }
      responses:
        200:
          description: Updated
    delete:
      tags: [Subjects]
      summary: Archive subject (soft delete)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Archived
  /subjects/{subject_id}/teachers:
    get:
      tags: [Subjects]
      summary: List teachers assigned to subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Teacher assignments
    post:
      tags: [Subjects]
      summary: Assign teacher to subject
      description: Creates subject_memberships row with subject_role=TEACHER
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [membership_id]
            properties:
              membership_id: { type: integer, example: 6 }
      responses:
        201:
          description: Assigned
  /subjects/{subject_id}/teachers/{membership_id}:
    delete:
      tags: [Subjects]
      summary: Remove teacher from subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: membership_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Removed
  /subjects/{subject_id}/students:
    get:
      tags: [Subjects]
      summary: List students enrolled in subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Student enrollments
    post:
      tags: [Subjects]
      summary: Enroll student in subject
      description: Admin/owner or teacher assigned to this subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [membership_id]
            properties:
              membership_id: { type: integer }
      responses:
        201:
          description: Enrolled
  /subjects/{subject_id}/students/{membership_id}:
    delete:
      tags: [Subjects]
      summary: Remove student from subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: membership_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Removed
  /subjects/{subject_id}/topics:
    get:
      tags: [Subjects]
      summary: List topics for subject
      description: |
        Requires active subject assignment (TEACHER or STUDENT) or workspace admin/owner.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Topics in subject
    post:
      tags: [Subjects]
      summary: Create topic under subject
      description: |
        Workspace admin/owner or teacher with subject_role=TEACHER on subject_memberships.
        Topics are global per subject (not per question bank).
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [name]
            properties:
              name: { type: string, example: "Algebra basics" }
              code: { type: string, example: "ALG-01" }
      responses:
        201:
          description: Topic created
  /subjects/{subject_id}/topics/{topic_id}:
    get:
      tags: [Subjects]
      summary: Get topic by id
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: topic_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Topic details
    patch:
      tags: [Subjects]
      summary: Update topic
      description: Admin/owner or subject-assigned TEACHER only.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: topic_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              name: { type: string }
              code: { type: string }
      responses:
        200:
          description: Topic updated
    delete:
      tags: [Subjects]
      summary: Delete topic
      description: Admin/owner or subject-assigned TEACHER only.
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
        - name: topic_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Topic deleted
  /subjects/{subject_id}/question-banks:
    get:
      tags: [Subjects]
      summary: List question banks for subject
      description: Visibility rules applied (PRIVATE, WORKSPACE, COMMUNITY)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: subject_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Question banks
  /question-banks:
    post:
      tags: [Question banks]
      summary: Create question bank
      description: Admin or teacher with subject_role=TEACHER on subject
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [title, subject_id]
            properties:
              title: { type: string, example: "Algebra Bank" }
              subject_id: { type: integer, example: 1 }
              description: { type: string }
              visibility: { type: string, enum: [PRIVATE, WORKSPACE, COMMUNITY], example: "WORKSPACE" }
      responses:
        201:
          description: Created
  /question-banks/my:
    get:
      tags: [Question banks]
      summary: My question banks (current membership)
      security: [{ Bearer: [], WorkspaceId: [] }]
      responses:
        200:
          description: Banks created by you
  /question-banks/{bank_id}/questions:
    post:
      tags: [Question banks]
      summary: Add question to bank (unified by type_code)
      description: |
        Creates a question and optional choices in one transaction.
        Supported type_code values: MCQ, TRUE_FALSE, MULTI_SELECT, ESSAY.
        Requires TEACHER assignment on the bank's subject (or workspace admin/owner).
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: bank_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [type_code, body]
            properties:
              type_code:
                type: string
                enum: [MCQ, TRUE_FALSE, MULTI_SELECT, ESSAY]
                example: MCQ
              body: { type: string, example: "What is the capital of France?" }
              explanation: { type: string }
              points: { type: number, example: 2 }
              difficulty: { type: string, enum: [EASY, MEDIUM, HARD] }
              topic_id:
                type: integer
                description: Optional. When set, must belong to the bank's subject.
              choices:
                type: array
                items:
                  type: object
                  required: [body, is_correct]
                  properties:
                    body: { type: string }
                    is_correct: { type: boolean }
                    order_index: { type: integer }
      responses:
        201:
          description: Question created
    get:
      tags: [Question banks]
      summary: List questions in bank
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: bank_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Questions in bank
  /question-banks/{bank_id}:
    patch:
      tags: [Question banks]
      summary: Update question bank
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: bank_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              title: { type: string }
              description: { type: string }
              visibility: { type: string, enum: [PRIVATE, WORKSPACE, COMMUNITY] }
      responses:
        200:
          description: Updated
    delete:
      tags: [Question banks]
      summary: Archive question bank (soft delete)
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - name: bank_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Archived
  /join-codes/register-student:
    post:
      tags: [Join codes]
      summary: Register new student with join code
      description: Creates user account and STUDENT membership. No Bearer token required.
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password, full_name, join_code]
            properties:
              email: { type: string }
              password: { type: string }
              full_name: { type: string }
              join_code: { type: string, example: "O388NXTZ" }
      responses:
        201:
          description: Student registered and joined workspace
  /join-codes/join:
    post:
      tags: [Join codes]
      summary: Existing user joins as STUDENT
      security: [{ Bearer: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              join_code: { type: string }
      responses:
        201:
          description: Joined
  /invites:
    post:
      tags: [Invites]
      summary: Create invitation
      security: [{ Bearer: [], WorkspaceId: [] }]
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              email: { type: string }
              assigned_role: { type: string, enum: [ADMIN, TEACHER, STUDENT] }
      responses:
        201:
          description: Invite created
  /invites/{token}:
    get:
      tags: [Invites]
      summary: Preview invite (read-only, no auth)
      description: Does not mutate database state. Works for guests and logged-in users.
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Invite preview (invited_email, role, workspace, status)
  /invites/{token}/register:
    post:
      tags: [Invites]
      summary: Register new user through invitation
      description: Email comes from invitation only. Not under /auth. For users without an account.
      parameters:
        - name: token
          in: path
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [full_name, password]
            properties:
              full_name: { type: string, example: "Ali Ahmad" }
              password: { type: string, example: "StrongPassword123" }
      responses:
        201:
          description: User and membership created, invitation accepted
        409:
          description: Account already exists — use POST /invites/{token}/accept after login
  /invites/{token}/accept:
    post:
      tags: [Invites]
      summary: Accept invite (existing user only)
      description: Requires access_token. Email must match invitation invited_email.
      security: [{ Bearer: [] }]
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Membership created
  /invites/{token}/reject:
    post:
      tags: [Invites]
      summary: Reject invite (no auth)
      description: Marks invitation as REJECTED. Does not create user or membership.
      parameters:
        - name: token
          in: path
          type: string
          required: true
      responses:
        200:
          description: Rejected
